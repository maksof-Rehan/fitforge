<meta name="theme-color" content="#0a0a10" />

<body>

<div class="auth" id="auth">
  <div class="auth-hero"><div class="logo">💪</div><h1>FitForge</h1><p>Your personal trainer in your pocket</p></div>
  <div class="auth-card">
    <div class="seg"><button id="segLogin" class="active">Login</button><button id="segSignup">Sign Up</button></div>
    <div class="auth-err" id="authErr"></div>
    <div id="authForm"></div>
  </div>
</div>

<div class="wizard" id="wizard">
  <div class="wz-top"><div class="wz-dots"><i id="d1"></i><i id="d2"></i><i id="d3"></i></div><h2 id="wzTitle"></h2><p id="wzSub"></p></div>
  <div class="wz-body" id="wzBody"></div>
  <div class="wz-nav" id="wzNav"></div>
</div>

<header id="appHeader">
  <div class="header-inner"><div class="title-wrap"><h1 id="hTitle">FitForge</h1><div class="sub" id="hSub"></div></div><button class="chip" id="hChip" style="display:none"></button></div>
  <div class="tabs" id="tabs" style="display:none"></div>
  <div class="progress-wrap" id="progressWrap" style="display:none"><div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div><div class="progress-meta"><span id="progressText">0 / 0 sets</span><span id="progressPct">0%</span></div></div>
</header>

<main id="app"></main>

<button class="timer-fab" id="timerFab"><svg viewBox="0 0 24 24"><path d="M15 1H9v2h6V1zm-4 13h2V8h-2v6zm8.03-6.61l1.42-1.42c-.43-.51-.9-.99-1.41-1.41l-1.42 1.42C16.07 4.74 14.12 4 12 4c-4.97 0-9 4.03-9 9s4.02 9 9 9 9-4.03 9-9c0-2.12-.74-4.07-1.97-5.61zM12 20c-3.87 0-7-3.13-7-7s3.13-7 7-7 7 3.13 7 7-3.13 7-7 7z"/></svg><span id="fabLabel">Rest Timer</span></button>
<div class="timer-panel" id="timerPanel">
  <div class="timer-display" id="timerDisplay">01:30</div>
  <div class="timer-presets" id="timerPresets"><button class="timer-preset" data-sec="45">45s</button><button class="timer-preset" data-sec="60">60s</button><button class="timer-preset active" data-sec="90">90s</button><button class="timer-preset" data-sec="120">2m</button><button class="timer-preset" data-sec="180">3m</button></div>
  <div class="timer-controls"><button class="t-start" id="tStart">Start</button><button class="t-reset" id="tReset">Reset</button><button class="t-close" id="tClose">Hide</button></div>
</div>

<div class="toast" id="toast">Saved</div>

<div class="modal" id="modal"><div class="modal-box" id="modalBox"></div></div>

<div class="vid-modal" id="vidModal">
  <div class="vid-box">
    <div class="vid-header"><div class="title" id="vidTitle">Exercise<span id="vidSub">Tutorial</span></div><button class="vid-close" id="vidClose"><svg viewBox="0 0 24 24"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg></button></div>
    <div class="vid-wrap"><div id="ytplayer"></div>
      <div class="vid-fallback" id="vidNA" style="display:none"><div class="big">🎬</div><h4>Demo not added yet</h4><p>This variation's video hasn't been added yet. Tap below to watch on YouTube.</p><a id="vidNAyt" class="demo-btn" target="_blank" rel="noopener"><svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg> Watch on YouTube</a></div>
    </div>
    <div class="vid-footer"><span class="hint" id="vidHint">Play the right video — it saves for everyone</span><a id="vidOpenYT" target="_blank" rel="noopener">↗ Find on YouTube</a></div>
  </div>
</div>

<nav class="bottom-nav" id="bottomNav">
  <button class="nav-item" data-view="home"><svg viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>Home</button>
  <button class="nav-item" data-view="workout"><svg viewBox="0 0 24 24"><path d="M20.57 14.86L22 13.43 20.57 12 17 15.57 8.43 7 12 3.43 10.57 2 9.14 3.43 7.71 2 5.57 4.14 4.14 2.71 2.71 4.14l1.43 1.43L2 7.71l1.43 1.43L2 10.57 3.43 12 7 8.43 15.57 17 12 20.57 13.43 22l1.43-1.43L16.29 22l2.14-2.14 1.43 1.43 1.43-1.43-1.43-1.43L23 16.29z"/></svg>Workout</button>
  <button class="nav-item" data-view="diet"><svg viewBox="0 0 24 24"><path d="M8.1 13.34l2.83-2.83L3.91 3.5a4 4 0 000 5.66l4.19 4.18zm6.78-1.81c1.53.71 3.68.21 5.27-1.38 1.91-1.91 2.28-4.65.81-6.12-1.46-1.46-4.2-1.1-6.12.81-1.59 1.59-2.09 3.74-1.38 5.27L3.7 19.87l1.41 1.41L12 14.41l6.88 6.88 1.41-1.41L13.41 13l1.47-1.47z"/></svg>Diet</button>
  <button class="nav-item" data-view="progress"><svg viewBox="0 0 24 24"><path d="M3.5 18.49l6-6.01 4 4L22 6.92l-1.41-1.41-7.09 7.97-4-4L2 16.99z"/></svg>Progress</button>
  <button class="nav-item" data-view="profile"><svg viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>Profile</button>
</nav>
